<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FZ Fassara</title>
    <!-- Sanya Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #0f0f1e;
            --card-bg: #16162a;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --muted-text: #8b8ba7;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(0, 255, 204, 0.1);
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-bottom: 2rem;
            color: var(--accent-color);
            font-size: 2rem;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--muted-text);
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2d2d44;
            background-color: #0f0f1e;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00ffcc, #0099ff);
            border: none;
            border-radius: 8px;
            color: #0f0f1e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 1rem;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .divider {
            margin: 2rem 0;
            position: relative;
            text-align: center;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #2d2d44;
            z-index: 1;
        }
        .divider span {
            background-color: var(--card-bg);
            padding: 0 10px;
            color: var(--muted-text);
            font-size: 0.85rem;
            position: relative;
            z-index: 2;
        }
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }
        .footer-text {
            margin-top: 2rem;
            color: var(--muted-text);
            font-size: 0.9rem;
        }
        .footer-text a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
        .flash-messages {
            background-color: rgba(255, 0, 85, 0.1);
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Shiga Ciki</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages">
          {% for message in messages %}
            {{ message }}
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="form-group">
            <label for="username">Sunan Mai Amfani (Username)</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Kalmar Sirri (Password)</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-submit">Shiga</button>
    </form>

    <div class="divider">
        <span>KUMA KO</span>
    </div>

    <!-- Cikakken Tsarin Google One Tap & Button na Zamani -->
    <div id="g_id_onload"
         data-client_id="785114901229-n6o1vbp13pq5i1150s76j3ech421rutl.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="redirect"
         data-login_uri="https://fz-fassara.onrender.com/login/google/callback"
         data-auto_prompt="false">
    </div>

    <div class="google-btn-wrapper">
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
    </div>

    <div class="footer-text">
        Baka da asusu ba tukunna? <a href="/register">Yi Rajista Mana</a>
    </div>
</div>

</body>
</html>
